<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Since GSAT</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Time Since GSAT (Second Last Saturday in January)</h1>
        <div>
            <label for="year-input">Enter Year: </label>
            <input type="number" id="year-input" value="2022" min="1900" max="9999">
            <button onclick="startCountdown()">Get Time</button>
        </div>
        <p id="remaining-time">Enter a year and click "Get Time"</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
