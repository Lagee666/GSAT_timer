<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Since GSAT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
        }
        #remaining-time {
            font-size: 1.5em;
            color: #d9534f;
        }
        input[type="number"] {
            padding: 8px;
            margin: 10px;
            font-size: 1em;
        }
        button {
            padding: 8px 16px;
            font-size: 1em;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Time Since GSAT (Second Last Saturday in January)</h1>
        <div>
            <label for="year-input">Enter Year: </label>
            <input type="number" id="year-input" value="2022" min="1900" max="9999">
            <button onclick="fetchRemainingTime()">Get Time</button>
        </div>
        <p id="remaining-time">Enter a year and click "Get Time"</p>
    </div>
    <script>
        let currentYear = 2022;
        let intervalId = null;
        let timeData = { days: 0, hours: 0, minutes: 0, seconds: 0 };

        function updateCountdown() {
            // Decrease seconds and adjust units
            timeData.seconds--;
            if (timeData.seconds < 0) {
                timeData.seconds = 59;
                timeData.minutes--;
                if (timeData.minutes < 0) {
                    timeData.minutes = 59;
                    timeData.hours--;
                    if (timeData.hours < 0) {
                        timeData.hours = 23;
                        timeData.days--;
                    }
                }
            }

            // Update display
            document.getElementById('remaining-time').textContent = 
                `${timeData.days} days, ${timeData.hours} hours, ${timeData.minutes} minutes, ${timeData.seconds} seconds`;
        }

        async function fetchRemainingTime() {
            // Clear previous interval
            if (intervalId) {
                clearInterval(intervalId);
            }

            // Get the year from input
            const yearInput = document.getElementById('year-input').value;
            currentYear = yearInput ? parseInt(yearInput) : 2022;

            // Validate year
            if (currentYear < 1900 || currentYear > 9999) {
                document.getElementById('remaining-time').textContent = 
                    'Please enter a year between 1900 and 9999';
                return;
            }

            try {
                const response = await fetch(`/api/remaining-time?year=${currentYear}`);
                if (!response.ok) {
                    throw new Error('Invalid year or server error');
                }
                timeData = await response.json();
                updateCountdown();

                // Start countdown every second
                intervalId = setInterval(updateCountdown, 1000);

                // Re-fetch every minute to correct drift
                setInterval(async () => {
                    try {
                        const response = await fetch(`/api/remaining-time?year=${currentYear}`);
                        if (response.ok) {
                            timeData = await response.json();
                        }
                    } catch (error) {
                        console.error('Error re-fetching:', error);
                    }
                }, 60000);
            } catch (error) {
                document.getElementById('remaining-time').textContent = 
                    'Error fetching time: ' + error.message;
                console.error('Error:', error);
            }
        }

        // Fetch immediately on page load
        fetchRemainingTime();
    </script>
</body>
</html>
